<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD ZONE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a08;font-family:'Barlow Condensed',sans-serif;color:#e8e0d0;cursor:none}
canvas{display:block;position:fixed;inset:0}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud-top{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;align-items:flex-start;gap:20px;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%)}
#hud-bot{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;display:flex;align-items:flex-end;justify-content:space-between;background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%)}

.hp-block{display:flex;flex-direction:column;gap:5px;min-width:200px}
.hp-label{font-size:11px;letter-spacing:.2em;color:#888;text-transform:uppercase}
.hp-bar{height:8px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden;position:relative}
.hp-fill{height:100%;background:#c0392b;border-radius:1px;transition:width .15s;box-shadow:0 0 8px #c0392b88}
.hp-val{font-family:'Bebas Neue';font-size:32px;color:#e8e0d0;line-height:1}

.score-block{text-align:right}
.score-label{font-size:11px;letter-spacing:.2em;color:#888;text-transform:uppercase}
.score-val{font-family:'Bebas Neue';font-size:40px;color:#e8e0d0;line-height:1}

.wave-block{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);padding:6px 16px;min-width:80px}
.wave-label{font-size:10px;letter-spacing:.2em;color:#c0392b;text-transform:uppercase}
.wave-val{font-family:'Bebas Neue';font-size:34px;color:#e8e0d0;line-height:1}

/* Weapon bar */
#weapon-bar{display:flex;gap:10px}
.weapon-slot{padding:6px 12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;gap:3px;min-width:72px;cursor:default;transition:all .15s}
.weapon-slot.active{border-color:#e8b84b;background:rgba(232,184,75,.12)}
.weapon-slot .wname{font-size:12px;font-weight:700;letter-spacing:.05em;color:#aaa}
.weapon-slot.active .wname{color:#e8b84b}
.weapon-slot .wammo{font-family:'Bebas Neue';font-size:20px;color:#e8e0d0;line-height:1}
.ammo-bar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
.ammo-fill{height:100%;background:#e8b84b;border-radius:1px;transition:width .1s}

/* Kill counter */
#kills-display{font-family:'Bebas Neue';font-size:26px;color:#c0392b;line-height:1}
#kills-label{font-size:10px;letter-spacing:.2em;color:#666;text-transform:uppercase}

/* Crosshair */
#xhair{position:fixed;pointer-events:none;z-index:50;transform:translate(-50%,-50%)}

/* Screens */
.screen{display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;flex-direction:column;gap:0}
.screen.show{display:flex}
.screen-bg{position:absolute;inset:0;background:rgba(0,0,0,.88)}

.title-wrap{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.game-title{font-family:'Bebas Neue';font-size:clamp(72px,12vw,140px);color:#c0392b;letter-spacing:.08em;line-height:.9;text-shadow:0 0 60px #c0392b88}
.game-sub{font-size:13px;letter-spacing:.35em;color:#666;text-transform:uppercase}
.btn{padding:14px 52px;background:#c0392b;color:#fff;border:none;cursor:pointer;font-family:'Bebas Neue';font-size:22px;letter-spacing:.15em;transition:all .15s;margin-top:8px}
.btn:hover{background:#e74c3c;transform:scale(1.03)}
.btn.secondary{background:transparent;border:1px solid #555;color:#888;font-size:16px;padding:10px 36px;margin-top:0}
.btn.secondary:hover{border-color:#e8e0d0;color:#e8e0d0;transform:none}

/* Upgrade screen */
#upgrade-screen .title-wrap{gap:10px}
#upgrade-title{font-family:'Bebas Neue';font-size:52px;color:#e8b84b;letter-spacing:.1em}
#upgrade-sub{font-size:12px;letter-spacing:.3em;color:#666;margin-bottom:6px}
#upgrade-cards{display:flex;gap:16px;margin-top:6px}
.upgrade-card{width:180px;padding:20px 16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px}
.upgrade-card:hover{border-color:#e8b84b;background:rgba(232,184,75,.08);transform:translateY(-3px)}
.upgrade-card .uc-icon{font-size:32px;text-align:center}
.upgrade-card .uc-name{font-family:'Bebas Neue';font-size:22px;color:#e8e0d0;letter-spacing:.08em}
.upgrade-card .uc-desc{font-size:12px;color:#888;line-height:1.5}

/* Wave flash */
#wave-flash{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#wave-flash.show{opacity:1}
#wave-flash-inner{font-family:'Bebas Neue';font-size:clamp(40px,7vw,80px);color:#c0392b;letter-spacing:.12em;text-shadow:0 0 40px #c0392b}

/* Score pop */
.spop{position:fixed;pointer-events:none;z-index:20;font-family:'Bebas Neue';font-size:16px;color:#e8b84b;text-shadow:0 2px 8px #0008;animation:spopAnim .8s ease-out forwards}
@keyframes spopAnim{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}

/* Reload flash */
#reload-flash{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue';font-size:20px;letter-spacing:.2em;color:#e8b84b;z-index:20;pointer-events:none;opacity:0;transition:opacity .2s}
#reload-flash.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Custom crosshair -->
<svg id="xhair" width="32" height="32" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="10" fill="none" stroke="#e8e0d0" stroke-width="1" opacity=".7"/>
  <line x1="16" y1="2" x2="16" y2="10" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#e8e0d0" stroke-width="1.5"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#e8e0d0" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="2" fill="#c0392b"/>
</svg>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">
    <div class="hp-block">
      <div class="hp-label">Health</div>
      <div class="hp-val" id="hp-val">100</div>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    </div>
    <div class="wave-block">
      <div class="wave-label">Wave</div>
      <div class="wave-val" id="wave-val">1</div>
    </div>
    <div style="flex:1"></div>
    <div class="score-block">
      <div class="score-label">Score</div>
      <div class="score-val" id="score-val">0</div>
    </div>
  </div>
  <div id="hud-bot">
    <div>
      <div style="font-size:10px;letter-spacing:.2em;color:#666;text-transform:uppercase;margin-bottom:6px">Weapons [1] [2] [3]</div>
      <div id="weapon-bar"></div>
    </div>
    <div style="text-align:right">
      <div id="kills-label">Kills</div>
      <div id="kills-display">0</div>
    </div>
  </div>
</div>
<div id="reload-flash">— RELOADING —</div>

<!-- Wave flash -->
<div id="wave-flash"><div id="wave-flash-inner"></div></div>

<!-- Start screen -->
<div class="screen show" id="start-screen">
  <div class="screen-bg"></div>
  <div class="title-wrap">
    <div class="game-title">DEAD<br>ZONE</div>
    <div class="game-sub">Top-down zombie survival</div>
    <button class="btn" id="start-btn">SURVIVE</button>
    <div style="font-size:11px;letter-spacing:.2em;color:#555;margin-top:4px">WASD MOVE · MOUSE AIM · CLICK SHOOT · R RELOAD · 1/2/3 WEAPONS</div>
  </div>
</div>

<!-- Upgrade screen -->
<div class="screen" id="upgrade-screen">
  <div class="screen-bg"></div>
  <div class="title-wrap">
    <div id="upgrade-title">WAVE CLEAR</div>
    <div id="upgrade-sub">CHOOSE AN UPGRADE</div>
    <div id="upgrade-cards"></div>
  </div>
</div>

<!-- Game over screen -->
<div class="screen" id="over-screen">
  <div class="screen-bg"></div>
  <div class="title-wrap">
    <div class="game-title" style="color:#e8e0d0">YOU<br><span style="color:#c0392b">DIED</span></div>
    <div id="over-score" style="font-family:'Bebas Neue';font-size:36px;color:#e8b84b;margin-top:6px">0</div>
    <div id="over-wave" style="font-size:12px;letter-spacing:.3em;color:#555;margin-bottom:8px">WAVE 1 · 0 KILLS</div>
    <button class="btn" id="restart-btn">TRY AGAIN</button>
  </div>
</div>

<script>
// ── CANVAS ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; cx=W/2; cy=H/2; }
resize(); window.addEventListener('resize', resize);

// ── CROSSHAIR ────────────────────────────────────────────────
const xhair = document.getElementById('xhair');
const mouse = {x:cx, y:cy, down:false};
window.addEventListener('mousemove', e=>{
  mouse.x=e.clientX; mouse.y=e.clientY;
  xhair.style.left=e.clientX+'px'; xhair.style.top=e.clientY+'px';
});
window.addEventListener('mousedown', ()=>{ mouse.down=true; });
window.addEventListener('mouseup',   ()=>{ mouse.down=false; });

// ── INPUT ────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown', e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key==='r'||e.key==='R') startReload();
  if(e.key==='1') switchWeapon(0);
  if(e.key==='2') switchWeapon(1);
  if(e.key==='3') switchWeapon(2);
  e.preventDefault && ['r',' '].includes(e.key) && e.preventDefault();
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

// ── AUDIO ────────────────────────────────────────────────────
let actx;
function audio(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(f,type,dur,vol,f2){
  try{
    const c=audio(),o=c.createOscillator(),g=c.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
    o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);
    if(f2){const o2=c.createOscillator(),g2=c.createGain();o2.type=type;o2.frequency.value=f2;
      g2.gain.setValueAtTime(vol*.6,c.currentTime+dur*.3);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur*1.5);
      o2.connect(g2);g2.connect(c.destination);o2.start(c.currentTime+dur*.3);o2.stop(c.currentTime+dur*1.5);}
  }catch(e){}
}
const SFX={
  pistol:  ()=>{ tone(200,'square',.06,.08); tone(400,'sawtooth',.04,.05); },
  shotgun: ()=>{ for(let i=0;i<4;i++) setTimeout(()=>tone(80+Math.random()*60,'sawtooth',.08,.1),i*8); },
  rifle:   ()=>{ tone(500,'square',.04,.09); tone(900,'sawtooth',.02,.04); },
  reload:  ()=>{ tone(300,'sine',.1,.05); setTimeout(()=>tone(200,'sine',.15,.06),200); },
  hit:     ()=>{ tone(120,'sawtooth',.15,.12); },
  zombie:  ()=>{ tone(80+Math.random()*40,'sawtooth',.1,.04); },
  die:     ()=>{ tone(60,'sawtooth',.4,.15,30); },
  upgrade: ()=>{ [440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.15,.07),i*80)); },
};

// ── WEAPONS ──────────────────────────────────────────────────
const WEAPON_DEFS = [
  { name:'PISTOL',  color:'#e8b84b', fireRate:18,  damage:25, spread:.04, pellets:1, bulletSpd:14, ammo:12,  maxAmmo:12,  reloadTime:90,  bulletR:3   },
  { name:'SHOTGUN', color:'#e87a4b', fireRate:45,  damage:15, spread:.25, pellets:6, bulletSpd:11, ammo:6,   maxAmmo:6,   reloadTime:120, bulletR:3.5 },
  { name:'RIFLE',   color:'#4be8b8', fireRate:6,   damage:40, spread:.01, pellets:1, bulletSpd:18, ammo:30,  maxAmmo:30,  reloadTime:100, bulletR:2.5 },
];

// ── GAME STATE ────────────────────────────────────────────────
let running=false, upgrading=false;
let score=0, kills=0, wave=1, waveCooldown=false;
let player={x:0,y:0,vx:0,vy:0,hp:100,maxHp:100,r:13,angle:0,speed:3.6};
let bullets=[], zombies=[], particles=[], bloodDecals=[], pickups=[];
let camX=0, camY=0;
let shootTimer=0, reloading=false, reloadTimer=0;
let weapons=WEAPON_DEFS.map(w=>({...w})), activeWeapon=0;
let iframes=0;

// Upgrades pool
const UPGRADES = [
  {icon:'❤️', name:'MEDKIT',     desc:'Restore 40 HP',                     apply:()=>{ player.hp=Math.min(player.maxHp,player.hp+40); updateHUD(); }},
  {icon:'💉', name:'ADRENALINE', desc:'Max HP +20, restore full health',    apply:()=>{ player.maxHp+=20; player.hp=player.maxHp; updateHUD(); }},
  {icon:'🔥', name:'HOT ROUNDS', desc:'All weapons deal +30% damage',       apply:()=>{ weapons.forEach(w=>w.damage=Math.round(w.damage*1.3)); }},
  {icon:'⚡', name:'SPEED',      desc:'Move 25% faster',                   apply:()=>{ player.speed*=1.25; }},
  {icon:'🔄', name:'FAST RELOAD',desc:'Reload time -35%',                  apply:()=>{ weapons.forEach(w=>w.reloadTime=Math.round(w.reloadTime*.65)); }},
  {icon:'🎯', name:'EXTRA MAG',  desc:'All ammo capacity +50%',            apply:()=>{ weapons.forEach(w=>{ w.maxAmmo=Math.round(w.maxAmmo*1.5); w.ammo=w.maxAmmo; }); }},
  {icon:'💥', name:'SPREAD',     desc:'Shotgun gets +3 pellets',           apply:()=>{ weapons[1].pellets+=3; }},
  {icon:'🌀', name:'RAPID FIRE', desc:'Pistol & rifle fire 40% faster',    apply:()=>{ weapons[0].fireRate=Math.round(weapons[0].fireRate*.6); weapons[2].fireRate=Math.round(weapons[2].fireRate*.6); }},
];

function initGame(){
  score=0; kills=0; wave=1; waveCooldown=false; camX=0; camY=0;
  shootTimer=0; reloading=false; reloadTimer=0; iframes=0;
  player={ x:0, y:0, vx:0, vy:0, hp:100, maxHp:100, r:13, angle:0, speed:3.6 };
  bullets=[]; zombies=[]; particles=[]; bloodDecals=[]; pickups=[];
  weapons = WEAPON_DEFS.map(w=>({...w}));
  activeWeapon=0;
  buildWeaponBar();
  updateHUD();
  spawnWave();
}

// ── HUD ───────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hp-val').textContent=Math.ceil(Math.max(0,player.hp));
  const p=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hp-fill').style.width=p+'%';
  document.getElementById('hp-fill').style.background=p>50?'#c0392b':p>25?'#e67e22':'#ff0000';
  document.getElementById('score-val').textContent=score;
  document.getElementById('kills-display').textContent=kills;
  document.getElementById('wave-val').textContent=wave;
  buildWeaponBar();
}

function buildWeaponBar(){
  const bar=document.getElementById('weapon-bar');
  bar.innerHTML='';
  weapons.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='weapon-slot'+(i===activeWeapon?' active':'');
    const pct=w.ammo/w.maxAmmo*100;
    d.innerHTML=`<div class="wname">[${i+1}] ${w.name}</div><div class="wammo">${reloading&&i===activeWeapon?'---':w.ammo+'/'+w.maxAmmo}</div><div class="ammo-bar"><div class="ammo-fill" style="width:${pct}%"></div></div>`;
    bar.appendChild(d);
  });
}

function popScore(v,wx,wy){
  score+=v;
  document.getElementById('score-val').textContent=score;
  const el=document.createElement('div'); el.className='spop';
  el.style.left=(wx-camX+cx)+'px'; el.style.top=(wy-camY+cy)+'px';
  el.textContent='+'+v; document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

// ── WAVES ─────────────────────────────────────────────────────
function spawnWave(){
  waveCooldown=false;
  const count=6+wave*3;
  for(let i=0;i<count;i++) setTimeout(()=>spawnZombie(), i*200);
  const f=document.getElementById('wave-flash');
  document.getElementById('wave-flash-inner').textContent=wave===1?'SURVIVE!':'WAVE '+wave;
  f.classList.add('show'); setTimeout(()=>f.classList.remove('show'),1500);
  document.getElementById('wave-val').textContent=wave;
}

// ── ZOMBIE TYPES ──────────────────────────────────────────────
const ZOMBIE_TYPES=[
  { name:'walker',  hp:60,  speed:1.1, r:14, color:'#5a7a3a', dmg:8,  score:100, big:false },
  { name:'runner',  hp:35,  speed:2.2, r:11, color:'#7a5a3a', dmg:12, score:150, big:false },
  { name:'brute',   hp:200, speed:0.7, r:22, color:'#3a5a3a', dmg:20, score:400, big:true  },
  { name:'spitter', hp:50,  speed:1.4, r:12, color:'#4a7a4a', dmg:6,  score:200, big:false },
];

function spawnZombie(){
  const angle=Math.random()*Math.PI*2;
  const dist=500+Math.random()*200;
  let typeIdx=0;
  const r=Math.random();
  if(wave>=3 && r<.15) typeIdx=2; // brute
  else if(wave>=2 && r<.35) typeIdx=1; // runner
  else if(wave>=4 && r<.45) typeIdx=3; // spitter
  const t={...ZOMBIE_TYPES[typeIdx]};
  // Scale with wave
  t.hp   = Math.round(t.hp   * (1 + wave*.15));
  t.speed= t.speed * (1 + wave*.05);
  zombies.push({
    x:Math.cos(angle)*dist, y:Math.sin(angle)*dist,
    vx:0, vy:0,
    hp:t.hp, maxHp:t.hp,
    r:t.r, color:t.color, dmg:t.dmg, speed:t.speed,
    score:t.score, type:t.name, big:t.big,
    wobble:Math.random()*Math.PI*2, hitFlash:0,
    legAnim:Math.random()*Math.PI*2,
  });
}

// ── SHOOTING ─────────────────────────────────────────────────
function switchWeapon(i){
  if(reloading) return;
  activeWeapon=i; buildWeaponBar();
}

function startReload(){
  if(reloading) return;
  const w=weapons[activeWeapon];
  if(w.ammo===w.maxAmmo) return;
  reloading=true; reloadTimer=w.reloadTime;
  SFX.reload();
  document.getElementById('reload-flash').classList.add('show');
  buildWeaponBar();
}

function tryShoot(){
  if(!running||reloading) return;
  const w=weapons[activeWeapon];
  if(shootTimer>0) return;
  if(w.ammo<=0){ startReload(); return; }
  const dx=mouse.x-cx, dy=mouse.y-cy;
  const baseAngle=Math.atan2(dy,dx);
  for(let p=0;p<w.pellets;p++){
    const spread=(Math.random()-.5)*w.spread;
    const ang=baseAngle+spread;
    bullets.push({
      x:player.x, y:player.y,
      vx:Math.cos(ang)*w.bulletSpd, vy:Math.sin(ang)*w.bulletSpd,
      r:w.bulletR, dmg:w.damage, life:55, type:activeWeapon,
    });
  }
  w.ammo--; shootTimer=w.fireRate;
  // Muzzle flash particle
  for(let i=0;i<5;i++) spawnParticle(player.x+Math.cos(baseAngle)*18, player.y+Math.sin(baseAngle)*18, '#ffee88', 2, 3);
  // Recoil
  player.vx-=Math.cos(baseAngle)*1.8; player.vy-=Math.sin(baseAngle)*1.8;
  WEAPON_DEFS[activeWeapon].name==='PISTOL'?SFX.pistol():WEAPON_DEFS[activeWeapon].name==='SHOTGUN'?SFX.shotgun():SFX.rifle();
  buildWeaponBar();
}

// ── PARTICLES ─────────────────────────────────────────────────
function spawnParticle(x,y,col,spd,n=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*spd+spd*.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,life:25+Math.random()*20,max:45,col});
  }
}
function spawnBlood(x,y,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*5+1;
    const r=2+Math.random()*4;
    bloodDecals.push({x:x+Math.cos(a)*Math.random()*20,y:y+Math.sin(a)*Math.random()*20,r,alpha:.7+Math.random()*.3});
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r,life:20,max:20,col:'#8b0000',blood:true});
  }
}

// ── PICKUPS ──────────────────────────────────────────────────
function spawnPickup(x,y){
  if(Math.random()<.3) pickups.push({x,y,type:'ammo',r:10,bob:0});
  else if(Math.random()<.2) pickups.push({x,y,type:'hp',r:10,bob:0});
}

// ── UPDATE ────────────────────────────────────────────────────
function update(){
  if(!running||upgrading) return;

  // Player movement
  let mx=(+!!(keys['d']||keys['arrowright']))-(+!!(keys['a']||keys['arrowleft']));
  let my=(+!!(keys['s']||keys['arrowdown']))-(+!!(keys['w']||keys['arrowup']));
  const mlen=Math.hypot(mx,my)||1;
  if(mx||my){ player.vx+=(mx/mlen)*player.speed*.4; player.vy+=(my/mlen)*player.speed*.4; }
  player.vx*=.78; player.vy*=.78;
  player.x+=player.vx; player.y+=player.vy;
  // Clamp
  const B=900;
  player.x=Math.max(-B,Math.min(B,player.x)); player.y=Math.max(-B,Math.min(B,player.y));
  player.angle=Math.atan2(mouse.y-cy, mouse.x-cx);

  // Shoot
  if(mouse.down) tryShoot();
  if(shootTimer>0) shootTimer--;
  if(reloading){
    reloadTimer--;
    if(reloadTimer<=0){
      reloading=false;
      weapons[activeWeapon].ammo=weapons[activeWeapon].maxAmmo;
      document.getElementById('reload-flash').classList.remove('show');
      buildWeaponBar();
    }
  }
  if(iframes>0) iframes--;

  // Bullets
  bullets=bullets.filter(b=>b.life>0);
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    for(let zi=zombies.length-1;zi>=0;zi--){
      const z=zombies[zi];
      if(Math.hypot(b.x-z.x,b.y-z.y)<b.r+z.r){
        b.life=0;
        z.hp-=b.dmg; z.hitFlash=6;
        spawnBlood(z.x,z.y,4);
        if(z.hp<=0){
          spawnBlood(z.x,z.y,20);
          popScore(z.score*(1+Math.floor(wave/3)),z.x,z.y);
          spawnPickup(z.x,z.y);
          kills++;
          SFX.zombie();
          zombies.splice(zi,1);
          document.getElementById('kills-display').textContent=kills;
          if(zombies.length===0&&!waveCooldown) nextWave();
        }
        break;
      }
    }
  }

  // Zombies
  zombies.forEach(z=>{
    z.wobble+=.05; z.legAnim+=.15;
    z.hitFlash=Math.max(0,z.hitFlash-1);
    const dx=player.x-z.x, dy=player.y-z.y, d=Math.hypot(dx,dy)||1;
    // Slight wander
    const wander=.08;
    z.vx=z.vx*.88+(dx/d)*z.speed*.12 + Math.cos(z.wobble)*wander;
    z.vy=z.vy*.88+(dy/d)*z.speed*.12 + Math.sin(z.wobble)*wander;
    z.x+=z.vx; z.y+=z.vy;
    // Push from others
    zombies.forEach(o=>{ if(o===z) return; const s=Math.hypot(z.x-o.x,z.y-o.y); const m=z.r+o.r+1; if(s<m&&s>.01){ const p=(m-s)/m*.6,ax=(z.x-o.x)/s,ay=(z.y-o.y)/s; z.x+=ax*p; z.y+=ay*p; }});
    // Damage player
    if(!iframes&&Math.hypot(z.x-player.x,z.y-player.y)<z.r+player.r+2){
      player.hp-=z.dmg*.12; iframes=8; SFX.hit();
      updateHUD();
      if(player.hp<=0) endGame();
    }
  });

  // Pickups
  pickups=pickups.filter(p=>p.life===undefined||p.life>0);
  pickups.forEach(p=>{
    p.bob=(p.bob||0)+.08;
    if(Math.hypot(p.x-player.x,p.y-player.y)<player.r+p.r+4){
      if(p.type==='ammo'){ weapons[activeWeapon].ammo=weapons[activeWeapon].maxAmmo; buildWeaponBar(); }
      else { player.hp=Math.min(player.maxHp,player.hp+30); updateHUD(); }
      spawnParticle(p.x,p.y,'#e8b84b',3,8);
      p.life=0;
    }
  });

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=.92; p.vy*=.92; p.r*=.97; p.life--; if(p.blood){ p.vy+=.15; }});

  // Camera
  camX+=(player.x-camX)*.1; camY+=(player.y-camY)*.1;
}

function nextWave(){
  waveCooldown=true;
  setTimeout(()=>{
    wave++;
    showUpgradeScreen();
  },1000);
}

// ── UPGRADE SCREEN ────────────────────────────────────────────
function showUpgradeScreen(){
  upgrading=true;
  document.getElementById('upgrade-screen').classList.add('show');
  document.getElementById('upgrade-title').textContent='WAVE '+(wave-1)+' CLEAR';
  // Pick 3 random upgrades
  const pool=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,3);
  const cards=document.getElementById('upgrade-cards');
  cards.innerHTML='';
  pool.forEach(u=>{
    const c=document.createElement('div'); c.className='upgrade-card';
    c.innerHTML=`<div class="uc-icon">${u.icon}</div><div class="uc-name">${u.name}</div><div class="uc-desc">${u.desc}</div>`;
    c.addEventListener('click',()=>{
      u.apply(); SFX.upgrade();
      document.getElementById('upgrade-screen').classList.remove('show');
      upgrading=false;
      spawnWave();
    });
    cards.appendChild(c);
  });
}

// ── DRAW ──────────────────────────────────────────────────────
// Precompute tile pattern
let tileCanvas, tileCtx;
function buildTile(){
  tileCanvas=document.createElement('canvas'); tileCanvas.width=80; tileCanvas.height=80;
  tileCtx=tileCanvas.getContext('2d');
  tileCtx.fillStyle='#111209'; tileCtx.fillRect(0,0,80,80);
  tileCtx.strokeStyle='rgba(255,255,255,.04)'; tileCtx.lineWidth=1;
  tileCtx.strokeRect(0,0,80,80);
  // Slight noise
  for(let i=0;i<30;i++){
    tileCtx.fillStyle=`rgba(${Math.random()>0.5?40:20},${Math.random()>0.5?38:18},${Math.random()>0.5?15:8},.4)`;
    tileCtx.fillRect(Math.random()*80,Math.random()*80,Math.random()*6+2,Math.random()*6+2);
  }
}
buildTile();

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(cx-camX, cy-camY);

  // Tiled floor
  const pattern=ctx.createPattern(tileCanvas,'repeat');
  ctx.save();
  ctx.fillStyle=pattern;
  ctx.fillRect(-1000,-1000,2000,2000);
  // Border walls
  ctx.strokeStyle='#333'; ctx.lineWidth=4;
  ctx.strokeRect(-900,-900,1800,1800);
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.restore();

  // Blood decals (capped at 80)
  if(bloodDecals.length>120) bloodDecals.splice(0,bloodDecals.length-120);
  bloodDecals.forEach(d=>{
    ctx.globalAlpha=d.alpha*.55;
    ctx.fillStyle='#5a0000';
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Pickups
  pickups.filter(p=>p.life===undefined||p.life>0).forEach(p=>{
    const bob=Math.sin((p.bob||0))*4;
    ctx.save(); ctx.translate(p.x,p.y+bob);
    ctx.fillStyle=p.type==='hp'?'#e74c3c':'#e8b84b';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=12;
    if(p.type==='hp'){
      ctx.font='bold 18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('♥',0,0);
    } else {
      ctx.font='bold 14px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚡',0,0);
    }
    ctx.shadowBlur=0; ctx.restore();
  });

  // Particles (blood behind zombies)
  particles.filter(p=>p.blood).forEach(p=>{
    ctx.globalAlpha=(p.life/p.max)*.8;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.5,p.r),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Zombies
  zombies.forEach(z=>{
    ctx.save(); ctx.translate(z.x,z.y);
    const ang = Math.atan2(player.y-z.y, player.x-z.x);
    ctx.rotate(ang + Math.PI/2); // face direction of travel (top = forward)

    const s = z.big ? 1.7 : (z.type==='runner' ? 0.85 : 1);
    ctx.scale(s, s);

    const flash = z.hitFlash > 0;
    const t = z.legAnim;

    // Shadow
    ctx.save(); ctx.scale(1, 0.4); ctx.translate(0, 30);
    ctx.globalAlpha = .25; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    ctx.restore(); ctx.globalAlpha=1;

    // ── LEGS (two rects swinging alternately) ──
    const legSwing = Math.sin(t) * 7;
    const skinCol   = flash ? '#fff' : (z.type==='brute' ? '#3a4a2a' : z.type==='runner' ? '#6a4a2a' : '#5a7040');
    const trouserCol= flash ? '#fff' : (z.type==='brute' ? '#2a2a1a' : '#3a3a2a');
    const shoeCol   = flash ? '#fff' : '#1a1a12';

    // Left leg
    ctx.save(); ctx.translate(-5, 8);
    ctx.rotate(legSwing * 0.07);
    ctx.fillStyle = trouserCol;
    ctx.fillRect(-3, 0, 6, 13);
    ctx.fillStyle = shoeCol;
    ctx.fillRect(-3, 12, 7, 4);
    ctx.restore();

    // Right leg
    ctx.save(); ctx.translate(5, 8);
    ctx.rotate(-legSwing * 0.07);
    ctx.fillStyle = trouserCol;
    ctx.fillRect(-3, 0, 6, 13);
    ctx.fillStyle = shoeCol;
    ctx.fillRect(-4, 12, 7, 4);
    ctx.restore();

    // ── TORSO ──
    const torsoCol = flash ? '#fff' : (z.type==='brute' ? '#4a3a2a' : z.type==='runner' ? '#5a3a1a' : '#4a5a30');
    ctx.fillStyle = torsoCol;
    if(z.type==='brute'){
      // wider hunched torso
      ctx.beginPath();
      ctx.moveTo(-12,-2); ctx.lineTo(12,-2);
      ctx.lineTo(10,10);  ctx.lineTo(-10,10);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(-8,-2); ctx.lineTo(8,-2);
      ctx.lineTo(7,10);  ctx.lineTo(-7,10);
      ctx.closePath(); ctx.fill();
    }
    // Torn shirt detail
    if(!flash){
      ctx.strokeStyle = darken(torsoCol, 0.6);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-4,2); ctx.lineTo(2,8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3,1);  ctx.lineTo(-1,6); ctx.stroke();
    }
    // Blood stain on chest
    if(!flash && z.type !== 'runner'){
      ctx.globalAlpha = .5;
      ctx.fillStyle = '#8b0000';
      ctx.beginPath(); ctx.arc(1, 4, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ── ARMS (outstretched forward = upward in rotated space) ──
    const armSwing = Math.sin(t + Math.PI/2) * 5;
    const armCol = flash ? '#fff' : skinCol;

    // Left arm — reaching forward
    ctx.save(); ctx.translate(-10, 0);
    ctx.rotate(-0.4 + armSwing*0.04);
    ctx.fillStyle = torsoCol;
    ctx.fillRect(-3,-14,6,10);
    ctx.fillStyle = armCol;
    ctx.fillRect(-3,-22,5,10);
    // hand (bony fingers)
    ctx.fillStyle = armCol;
    ctx.beginPath(); ctx.arc(-1,-23,3.5,0,Math.PI*2); ctx.fill();
    if(!flash){
      ctx.strokeStyle='#2a1a0a'; ctx.lineWidth=0.8;
      [-3,-1,1,3].forEach(fx=>{ ctx.beginPath(); ctx.moveTo(fx,-21); ctx.lineTo(fx+0.5,-26); ctx.stroke(); });
    }
    ctx.restore();

    // Right arm — reaching forward
    ctx.save(); ctx.translate(10, 0);
    ctx.rotate(0.4 - armSwing*0.04);
    ctx.fillStyle = torsoCol;
    ctx.fillRect(-3,-14,6,10);
    ctx.fillStyle = armCol;
    ctx.fillRect(-2,-22,5,10);
    ctx.fillStyle = armCol;
    ctx.beginPath(); ctx.arc(1,-23,3.5,0,Math.PI*2); ctx.fill();
    if(!flash){
      ctx.strokeStyle='#2a1a0a'; ctx.lineWidth=0.8;
      [-3,-1,1,3].forEach(fx=>{ ctx.beginPath(); ctx.moveTo(fx,-21); ctx.lineTo(fx+0.5,-26); ctx.stroke(); });
    }
    ctx.restore();

    // ── HEAD ──
    const headCol = flash ? '#fff' : skinCol;
    // Neck
    ctx.fillStyle = headCol;
    ctx.fillRect(-3,-10,6,6);

    // Skull shape
    ctx.fillStyle = headCol;
    ctx.beginPath();
    ctx.ellipse(0,-18, z.big?11:8, z.big?12:9, 0,0,Math.PI*2);
    ctx.fill();

    // Jaw (slightly open, shambling)
    ctx.fillStyle = flash ? '#fff' : darken(headCol, 0.85);
    ctx.beginPath();
    ctx.ellipse(0,-13, z.big?7:5, 3+Math.abs(Math.sin(t))*2, 0,0,Math.PI*2);
    ctx.fill();
    // Mouth gap
    if(!flash){
      ctx.fillStyle='#1a0505';
      ctx.beginPath(); ctx.ellipse(0,-13,z.big?5:3.5,1.5+Math.abs(Math.sin(t))*1.5,0,0,Math.PI*2); ctx.fill();
      // Teeth
      ctx.fillStyle='#d4c89a';
      [-3,0,3].forEach(tx=>{
        ctx.fillRect(tx-1,-15,2,2.5);
      });
    }

    // Eyes
    const eyeY = z.big ? -21 : -19;
    const eyeX = z.big ? 4.5 : 3.5;
    if(!flash){
      // Eye sockets dark
      ctx.fillStyle='#1a0a0a';
      ctx.beginPath(); ctx.ellipse(-eyeX, eyeY, 3.5,3,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( eyeX, eyeY, 3.5,3,0,0,Math.PI*2); ctx.fill();
    }
    // Glowing pupils
    const eyeGlow = z.type==='brute' ? '#ff6600' : z.type==='runner' ? '#ffcc00' : '#cc2200';
    ctx.fillStyle = flash ? '#000' : eyeGlow;
    ctx.shadowColor = eyeGlow; ctx.shadowBlur = flash?0:6;
    ctx.beginPath(); ctx.arc(-eyeX, eyeY, z.big?2:1.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( eyeX, eyeY, z.big?2:1.6,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Head wound / exposed skull for brute
    if(!flash && z.type==='brute'){
      ctx.fillStyle='#8b0000';
      ctx.beginPath(); ctx.arc(2,-23,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e8d8b0';
      ctx.beginPath(); ctx.arc(2,-23,2,0,Math.PI*2); ctx.fill();
    }
    // Runner has a gash on cheek
    if(!flash && z.type==='runner'){
      ctx.strokeStyle='#8b0000'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(4,-16); ctx.lineTo(7,-20); ctx.stroke();
    }

    // HP bar
    if(z.hp<z.maxHp){
      ctx.save(); ctx.scale(1/s,1/s); // unscale so bar is consistent size
      const bw=40, bh=4;
      ctx.fillStyle='#222'; ctx.fillRect(-bw/2,-38,bw,bh);
      ctx.fillStyle=z.hp/z.maxHp>.5?'#27ae60':'#e67e22';
      ctx.fillRect(-bw/2,-38,bw*(z.hp/z.maxHp),bh);
      ctx.restore();
    }

    ctx.restore();
  });

  // Non-blood particles (muzzle flash etc.)
  particles.filter(p=>!p.blood).forEach(p=>{
    ctx.globalAlpha=(p.life/p.max)*.9;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.5,p.r),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Bullets
  bullets.forEach(b=>{
    ctx.save(); ctx.translate(b.x,b.y);
    const ang=Math.atan2(b.vy,b.vx); ctx.rotate(ang);
    const col=b.type===2?'#88ffdd':b.type===1?'#ffaa44':'#ffee88';
    // Elongated bullet
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(0,0,b.r*2.5,b.r,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  });

  // Player
  ctx.save(); ctx.translate(player.x,player.y);

  // Shadow
  ctx.globalAlpha=.35; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,player.r*.5,player.r*.85,player.r*.35,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // Body
  if(iframes>0&&Math.floor(iframes/2)%2) ctx.globalAlpha=.3;
  // Legs
  ctx.save(); ctx.rotate(player.angle);
  const ls=Math.sin(Date.now()*.015)*5*(Math.hypot(player.vx,player.vy)>.3?1:0);
  ctx.fillStyle='#2c3e50';
  ctx.fillRect(-4,2,7,player.r*.9+ls);
  ctx.fillRect(-4,2,7,player.r*.9-ls);
  ctx.restore();

  // Torso
  ctx.fillStyle='#2c3e50';
  ctx.beginPath(); ctx.arc(0,0,player.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#34495e';
  ctx.beginPath(); ctx.arc(0,0,player.r*.7,0,Math.PI*2); ctx.fill();

  // Gun
  ctx.save(); ctx.rotate(player.angle);
  const wc=weapons[activeWeapon].color;
  ctx.fillStyle=wc; ctx.shadowColor=wc; ctx.shadowBlur=6;
  ctx.fillRect(player.r*.4,-3,player.r*.9+(activeWeapon===1?4:0),6);
  ctx.shadowBlur=0; ctx.restore();

  ctx.globalAlpha=1; ctx.restore();

  ctx.restore(); // world

  // Screen-space vignette
  const vgr=ctx.createRadialGradient(cx,cy,H*.3,cx,cy,H*.85);
  vgr.addColorStop(0,'rgba(0,0,0,0)');
  vgr.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vgr; ctx.fillRect(0,0,W,H);
}

function darken(hex,f){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

// ── LOOP ──────────────────────────────────────────────────────
function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ── SCREENS ──────────────────────────────────────────────────
function startGame(){
  document.getElementById('start-screen').classList.remove('show');
  running=true; initGame();
}
function endGame(){
  running=false; SFX.die();
  document.getElementById('over-score').textContent=score;
  document.getElementById('over-wave').textContent='WAVE '+wave+' · '+kills+' KILLS';
  setTimeout(()=>document.getElementById('over-screen').classList.add('show'),1000);
}
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('over-screen').classList.remove('show');
  startGame();
});

loop();
</script>
