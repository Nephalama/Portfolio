<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@300;400;500;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0c0f0a;
    --bg2:     #141710;
    --bg3:     #1d2119;
    --bg4:     #252b20;
    --fg:      #e8ede0;
    --fg2:     #8a9478;
    --fg3:     #556047;
    --accent:  #a8d878;
    --accent2: #7ab84a;
    --accent3: #c8f098;
    --user-bg: #1e2d14;
    --user-border: #3a5428;
    --border:  rgba(168,216,120,0.1);
    --border2: rgba(168,216,120,0.18);
    --shadow:  0 0 0 1px rgba(168,216,120,0.08), 0 32px 80px rgba(0,0,0,0.6);
    --font-display: 'Cabinet Grotesk', sans-serif;
    --font-serif: 'Instrument Serif', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-display);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(168,216,120,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,216,120,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(120,180,60,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .shell {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  .chat-window {
    width: 100%; max-width: 780px;
    height: min(90vh, 860px);
    display: flex; flex-direction: column;
    border: 1px solid var(--border2);
    border-radius: 24px; overflow: hidden;
    background: var(--bg2);
    box-shadow: var(--shadow);
    animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }

  /* Header */
  .chat-header {
    flex-shrink: 0;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: var(--bg3);
    position: relative; overflow: hidden;
  }
  .chat-header::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(168,216,120,0.03), transparent);
    pointer-events: none;
  }

  .logo-mark {
    width: 42px; height: 42px; flex-shrink: 0;
    border: 1px solid var(--border2); border-radius: 12px;
    background: var(--bg4);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .logo-mark svg { width: 22px; height: 22px; }
  .logo-mark::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(168,216,120,0.2), transparent 70%);
  }

  .header-info { flex: 1; }
  .header-name {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--fg);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(168,216,120,0.25);
    animation: statusPulse 2.5s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(168,216,120,0.25); }
    50% { box-shadow: 0 0 0 5px rgba(168,216,120,0.1); }
  }
  .header-sub {
    font-size: 12px; color: var(--fg3);
    letter-spacing: 0.3px; margin-top: 2px;
    font-family: var(--font-mono);
  }

  .header-actions { display: flex; gap: 8px; }
  .hdr-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border); border-radius: 8px;
    background: none; color: var(--fg3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(168,216,120,0.06); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .date-sep {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--fg3);
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .msg-row {
    display: flex; gap: 12px; align-items: flex-end;
    animation: msgIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; flex-shrink: 0;
    border-radius: 8px; border: 1px solid var(--border2);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; margin-bottom: 2px;
  }
  .msg-row.user .msg-avatar {
    background: var(--user-bg); border-color: var(--user-border);
    font-size: 12px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.5px; font-family: var(--font-mono);
  }

  .msg-body { max-width: 74%; display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 14px 18px; border-radius: 18px;
    font-size: 14.5px; line-height: 1.7; word-break: break-word;
  }
  .msg-row.ai .bubble {
    background: var(--bg3); border: 1px solid var(--border);
    border-bottom-left-radius: 4px; color: var(--fg);
  }
  .msg-row.user .bubble {
    background: var(--user-bg); border: 1px solid var(--user-border);
    border-bottom-right-radius: 4px; color: var(--fg);
  }

  .bubble pre {
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 10px 0;
    font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; color: var(--accent3);
  }
  .bubble code:not(pre code) {
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 12.5px;
    color: var(--accent3); border: 1px solid var(--border);
  }
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { font-family: var(--font-serif); font-style: italic; color: var(--fg2); }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 4px 0; }
  .bubble h3 { font-size: 15px; color: var(--accent); margin: 10px 0 4px; font-weight: 700; }

  .msg-meta {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg3); letter-spacing: 0.3px; padding: 0 4px;
  }

  .typing-bubble {
    display: flex; gap: 5px; padding: 16px 20px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 18px; border-bottom-left-radius: 4px; align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px; background: var(--fg3); border-radius: 50%;
    animation: bounce 1.3s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); background: var(--fg3); }
    30% { transform: translateY(-7px); background: var(--accent); }
  }

  /* Suggestions */
  .suggestions {
    flex-shrink: 0; padding: 0 24px 14px;
    display: flex; gap: 8px; overflow-x: auto; flex-wrap: nowrap;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .suggestion-chip {
    flex-shrink: 0; background: none; border: 1px solid var(--border2);
    border-radius: 100px; padding: 7px 16px;
    font-family: var(--font-display); font-size: 12px;
    color: var(--fg2); cursor: pointer;
    transition: all 0.25s; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .suggestion-chip:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(168,216,120,0.06); transform: translateY(-1px);
  }

  /* Input */
  .input-bar {
    flex-shrink: 0; padding: 16px 20px;
    border-top: 1px solid var(--border); background: var(--bg3);
    display: flex; gap: 10px; align-items: flex-end;
  }

  .input-wrap {
    flex: 1; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 14px; transition: border-color 0.25s, box-shadow 0.25s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(168,216,120,0.08);
  }
  textarea#msgInput {
    width: 100%; padding: 13px 18px;
    background: none; border: none; outline: none;
    font-family: var(--font-display); font-size: 14.5px;
    color: var(--fg); line-height: 1.5; resize: none;
    max-height: 160px; overflow-y: auto; display: block;
  }
  textarea#msgInput::placeholder { color: var(--fg3); }

  .send-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--accent2); border: none; border-radius: 12px;
    color: #0c0f0a; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .send-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(122,184,74,0.35); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { background: var(--bg4); color: var(--fg3); cursor: not-allowed; transform: none; box-shadow: none; }
  .send-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  /* Welcome */
  .welcome-card {
    margin: auto; max-width: 420px; text-align: center; padding: 16px 0;
  }
  .welcome-glyph {
    width: 64px; height: 64px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 18px; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .welcome-glyph::before {
    content: ''; position: absolute; inset: -1px; border-radius: 18px;
    background: linear-gradient(135deg, rgba(168,216,120,0.4), transparent); z-index: -1;
  }
  .welcome-glyph svg { width: 30px; height: 30px; }
  .welcome-title { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 10px; }
  .welcome-title span { color: var(--accent); font-family: var(--font-serif); font-style: italic; font-weight: 400; }
  .welcome-sub { color: var(--fg2); font-size: 14px; line-height: 1.7; }

  .error-bubble {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; color: #fca5a5; font-family: var(--font-mono);
  }

  @media (max-width: 600px) {
    .shell { padding: 0; }
    .chat-window { height: 100vh; border-radius: 0; }
    .bubble { font-size: 14px; padding: 12px 15px; }
    .header-actions { display: none; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="chat-window">

    <div class="chat-header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
          <path d="M12 2a7 7 0 017 7c0 3-1.5 5.5-4 6.8V18a1 1 0 01-1 1h-4a1 1 0 01-1-1v-2.2C6.5 14.5 5 12 5 9a7 7 0 017-7z"/>
          <path d="M9 21h6M10 21v1.5a.5.5 0 00.5.5h3a.5.5 0 00.5-.5V21"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-name">AURA <div class="status-dot"></div></div>
        <div class="header-sub">claude-sonnet · ready</div>
      </div>
      <div class="header-actions">
        <button class="hdr-btn" title="Clear chat" onclick="clearChat()">
          <svg width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="date-sep">Today</div>
      <div id="welcomeCard" class="welcome-card" style="display:flex;flex-direction:column;align-items:center;gap:0;">
        <div class="welcome-glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div class="welcome-title">Hello, I'm <span>AURA</span></div>
        <div class="welcome-sub">Powered by Claude. Ask me anything — code, science, writing, math, or just a conversation.</div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="useSuggestion(this)">⚛️ Explain quantum entanglement</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">🐍 Python quicksort algorithm</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">✍️ Write a noir short story</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">🧮 Explain Bayes' theorem</button>
      <button class="suggestion-chip" onclick="useSuggestion(this)">🌍 How does GPS work?</button>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="Ask anything…" maxlength="4000"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  // After deploying worker.js to Cloudflare, paste your worker URL here:
  const WORKER_URL = 'https://workerjs.nephalamathendo14.workers.dev';
  // ─────────────────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('messages');
  const input      = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const suggestions = document.getElementById('suggestions');
  const welcomeCard = document.getElementById('welcomeCard');

  let history   = [];
  let isLoading = false;

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    sendBtn.disabled = !input.value.trim() || isLoading;
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.disabled = true;

  const getTime = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const scrollToBottom = () => { messagesEl.scrollTop = messagesEl.scrollHeight; };

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatText(text) {
    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, _lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    text = text.replace(/\n\n/g, '</p><p style="margin-top:10px">');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  const aiAvatar = `
    <div class="msg-avatar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8">
        <path d="M12 2a7 7 0 017 7c0 3-1.5 5.5-4 6.8V18a1 1 0 01-1 1h-4a1 1 0 01-1-1v-2.2C6.5 14.5 5 12 5 9a7 7 0 017-7z"/>
      </svg>
    </div>`;

  function appendUserMessage(text) {
    welcomeCard.style.display = 'none';
    suggestions.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-body">
        <div class="bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>
        <div class="msg-meta">${getTime()}</div>
      </div>
      <div class="msg-avatar">you</div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai'; row.id = 'typingRow';
    row.innerHTML = `${aiAvatar}
      <div class="msg-body">
        <div class="typing-bubble"><span></span><span></span><span></span></div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    document.getElementById('typingRow')?.remove();
  }

  function appendAiMessage(text, isError = false) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    const content = isError
      ? `<div class="error-bubble">⚠ ${escapeHtml(text)}</div>`
      : `<div class="bubble">${formatText(text)}</div>`;
    row.innerHTML = `${aiAvatar}
      <div class="msg-body">
        ${content}
        <div class="msg-meta">${getTime()}</div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(text);
    history.push({ role: 'user', content: text });
    appendTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: "You are AURA, a thoughtful and precise AI assistant. Give clear, helpful, well-structured responses. Use markdown when helpful — code blocks for code, **bold** for key terms, bullet points for lists. Be concise but thorough.",
          messages: history
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        appendAiMessage(data.error.message || 'Something went wrong.', true);
      } else {
        const reply = data.content?.find(b => b.type === 'text')?.text || 'No response received.';
        history.push({ role: 'assistant', content: reply });
        appendAiMessage(reply);
      }
    } catch (err) {
      removeTyping();
      appendAiMessage('Could not reach the server. Is your worker deployed?', true);
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  function useSuggestion(btn) {
    const text = btn.textContent.trim().replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{2B00}-\u{2BFF}\u{1F300}-\u{1F9FF}]\s*/u, '').trim();
    input.value = text;
    input.dispatchEvent(new Event('input'));
    sendMessage();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = `
      <div class="date-sep">Today</div>
      <div id="welcomeCard" class="welcome-card" style="display:flex;flex-direction:column;align-items:center;gap:0;">
        <div class="welcome-glyph">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div class="welcome-title">Hello, I'm <span>AURA</span></div>
        <div class="welcome-sub">Powered by Claude. Ask me anything — code, science, writing, math, or just a conversation.</div>
      </div>`;
    suggestions.style.display = 'flex';
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';
    input.focus();
  }

  input.focus();
</script>
</body>
</html>
