<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick a Card | Thendo Nephalama</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  min-height:100vh;
  background:#0c0008;
  font-family:'Crimson Text',serif;
  color:#f0e6d3;
  overflow-x:hidden;
  position:relative;
}

/* Felt table bg */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%,#1a0a12 0%,#0c0008 70%),
    repeating-linear-gradient(45deg,rgba(255,255,255,.005) 0,rgba(255,255,255,.005) 1px,transparent 0,transparent 50%);
  background-size:cover,6px 6px;
  pointer-events:none;
}
body::after{
  content:'';position:fixed;
  inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(120,30,50,.15) 0%,transparent 70%);
  pointer-events:none;
}

/* Back link */
.back-link{
  position:fixed;top:1.5rem;left:1.5rem;z-index:100;
  padding:.5rem 1.1rem;border-radius:20px;
  background:rgba(240,230,211,.07);
  border:1px solid rgba(240,230,211,.15);
  color:rgba(240,230,211,.6);text-decoration:none;
  font-size:.78rem;letter-spacing:.05em;
  transition:all .2s;
}
.back-link:hover{color:#f0e6d3;background:rgba(240,230,211,.12)}

/* Header */
header{
  text-align:center;
  padding:3.5rem 1rem 1.5rem;
  position:relative;z-index:1;
}
.crown{font-size:2.5rem;margin-bottom:.5rem;display:block;opacity:.8}
h1{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(2rem,5vw,3.5rem);
  letter-spacing:.08em;
  background:linear-gradient(180deg,#f5d56e 0%,#c9913c 60%,#8a5c1c 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;
  margin-bottom:.5rem;
}
.sub{
  font-style:italic;font-size:1.1rem;
  color:rgba(240,230,211,.5);
  letter-spacing:.05em;
}

/* Score */
.score-bar{
  display:flex;align-items:center;justify-content:center;gap:2rem;
  padding:.75rem 2rem;margin:.5rem auto;
  max-width:400px;
  background:rgba(0,0,0,.3);
  border:1px solid rgba(240,230,211,.08);
  border-radius:12px;
  font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.1em;
  color:rgba(240,230,211,.5);
}
.score-val{color:#f5d56e;font-size:1.1rem;font-weight:700}

/* Cards container */
.table{
  display:flex;flex-wrap:wrap;
  justify-content:center;gap:2rem;
  padding:2rem 1rem 1rem;
  position:relative;z-index:1;
}

/* Card */
.card-wrap{
  perspective:1000px;
  width:160px;height:240px;
  cursor:pointer;
}
.card-wrap:hover{z-index:10}
.card-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.34,1.56,.64,1);
}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-wrap:hover:not(.flipped) .card-inner{transform:rotateY(10deg) translateY(-10px)}

.card-face{
  position:absolute;inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border:1px solid rgba(255,255,255,.15);
  overflow:hidden;
}

/* Front (unrevealed) */
.card-front{
  background:#1a0a0e;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
}
.card-pattern{
  width:80%;height:80%;
  border:2px solid rgba(180,120,50,.25);
  border-radius:8px;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(180,120,50,.05) 6px,rgba(180,120,50,.05) 7px),
    repeating-linear-gradient(-45deg,transparent,transparent 6px,rgba(180,120,50,.05) 6px,rgba(180,120,50,.05) 7px);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.card-pattern::before,.card-pattern::after{
  content:'★';
  position:absolute;font-size:1.5rem;
  color:rgba(180,120,50,.2);
}
.card-pattern::before{top:50%;left:50%;transform:translate(-50%,-50%)}

/* Back (revealed) */
.card-back{
  background:var(--card-color,#fff);
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:.25rem;
  box-shadow:0 10px 40px rgba(0,0,0,.7);
  padding:1rem;
}
.card-suit-big{
  font-size:4rem;line-height:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
}
.card-value-big{
  font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;
  color:var(--card-ink,#111);line-height:1;
}
.card-name{
  font-family:'Cinzel',serif;font-size:.62rem;
  letter-spacing:.1em;color:var(--card-ink,#111);
  opacity:.7;text-transform:uppercase;text-align:center;
}
.card-corner{
  position:absolute;top:.5rem;left:.6rem;
  font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;
  color:var(--card-ink,#111);line-height:1.1;
}
.card-corner.br{
  top:auto;left:auto;bottom:.5rem;right:.6rem;
  transform:rotate(180deg);
}
.card-stats{
  display:flex;gap:.5rem;margin-top:.25rem;flex-wrap:wrap;justify-content:center;
}
.stat-pip{
  font-size:.65rem;padding:2px 7px;border-radius:8px;
  background:rgba(0,0,0,.07);
  font-family:'Cinzel',serif;
  color:var(--card-ink,#111);
}

/* Selected glow */
.card-wrap.selected .card-inner{
  filter:drop-shadow(0 0 20px rgba(245,213,110,.5));
}
.card-wrap.selected .card-face{
  border-color:rgba(245,213,110,.5);
}

/* Action area */
.actions{
  text-align:center;padding:1rem 1rem 2rem;
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}
.result-msg{
  font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.05em;
  color:#f5d56e;min-height:1.6rem;
  text-align:center;
}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
.game-btn{
  padding:.7rem 1.75rem;border-radius:10px;
  font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;
  letter-spacing:.1em;cursor:pointer;
  transition:all .2s;border:none;
}
.btn-reveal{
  background:linear-gradient(135deg,#c9913c,#f5d56e);
  color:#2a1500;
  box-shadow:0 4px 18px rgba(201,145,60,.4);
}
.btn-reveal:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,145,60,.5)}
.btn-battle{
  background:linear-gradient(135deg,#7c1c2a,#c0392b);
  color:#f5d56e;
  box-shadow:0 4px 18px rgba(192,57,43,.35);
}
.btn-battle:hover{transform:translateY(-2px)}
.btn-reset{
  background:rgba(240,230,211,.06);border:1px solid rgba(240,230,211,.15);
  color:rgba(240,230,211,.6);
}
.btn-reset:hover{background:rgba(240,230,211,.1);color:#f0e6d3}

/* Particles */
.particle{
  position:fixed;pointer-events:none;z-index:999;
  width:6px;height:6px;border-radius:50%;
  animation:particleFly 1s forwards;
}
@keyframes particleFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}
}

/* Hint */
.hint{
  font-size:.8rem;font-style:italic;
  color:rgba(240,230,211,.25);
  letter-spacing:.04em;
}

@media(max-width:600px){
  .table{gap:1.25rem}
  .card-wrap{width:130px;height:200px}
  .card-suit-big{font-size:3rem}
}
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Portfolio</a>

<header>
  <span class="crown">♠ ♥ ♦ ♣</span>
  <h1>Pick a Card</h1>
  <p class="sub">Tap to reveal · Challenge to battle</p>
</header>

<div class="score-bar">
  <span>Wins <span class="score-val" id="wins">0</span></span>
  <span>Losses <span class="score-val" id="losses">0</span></span>
  <span>Draws <span class="score-val" id="draws">0</span></span>
</div>

<div class="table" id="table"></div>

<div class="actions">
  <div class="result-msg" id="result"></div>
  <div class="btn-row">
    <button class="game-btn btn-reveal" onclick="revealAll()">Reveal All</button>
    <button class="game-btn btn-battle" onclick="battle()">⚔ Battle!</button>
    <button class="game-btn btn-reset" onclick="reset()">↺ New Deck</button>
  </div>
  <div class="hint" id="hint">Click any card to flip it</div>
</div>

<script>
const CARDS=[
  {id:'spadeA',suit:'♠',value:'A',name:'Ace of Spades',color:'#ffffff',ink:'#111111',power:15,speed:10,defense:8,lore:'The highest of all — the Ace of Spades commands absolute power.'},
  {id:'heartQ',suit:'♥',value:'Q',name:'Queen of Hearts',color:'#ffe8e8',ink:'#8b0000',power:12,speed:9,defense:11,lore:'She rules with grace and an iron will. Never underestimate her.'},
  {id:'clubK',suit:'♣',value:'K',name:'King of Clubs',color:'#e8f4e8',ink:'#1a4a1a',power:14,speed:8,defense:13,lore:'Steadfast and unbreakable, the King of Clubs endures all.'},
  {id:'diamondJ',suit:'♦',value:'J',name:'Jack of Diamonds',color:'#fff5e0',ink:'#7a3800',power:10,speed:14,defense:7,lore:'Quick and cunning — the Jack of Diamonds strikes before you blink.'},
];

let score={wins:0,losses:0,draws:0};
let flipped=new Set(), selected=null;

function renderCards(){
  const t=document.getElementById('table');
  t.innerHTML='';
  CARDS.forEach(c=>{
    const wrap=document.createElement('div');
    wrap.className='card-wrap'+(flipped.has(c.id)?' flipped':'')+(selected===c.id?' selected':'');
    wrap.dataset.id=c.id;
    wrap.innerHTML=`
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-pattern"></div>
        </div>
        <div class="card-face card-back" style="background:${c.color}">
          <div class="card-corner" style="color:${c.ink}">${c.value}<br><span style="font-size:.9em">${c.suit}</span></div>
          <div class="card-corner br" style="color:${c.ink}">${c.value}<br><span style="font-size:.9em">${c.suit}</span></div>
          <div class="card-suit-big">${c.suit}</div>
          <div class="card-value-big" style="color:${c.ink}">${c.value}</div>
          <div class="card-name" style="color:${c.ink}">${c.name}</div>
          <div class="card-stats">
            <span class="stat-pip" style="color:${c.ink}">⚔ ${c.power}</span>
            <span class="stat-pip" style="color:${c.ink}">⚡ ${c.speed}</span>
            <span class="stat-pip" style="color:${c.ink}">🛡 ${c.defense}</span>
          </div>
        </div>
      </div>`;
    wrap.addEventListener('click',()=>flipCard(c.id,wrap));
    t.appendChild(wrap);
  });
}

function flipCard(id,wrap){
  if(!flipped.has(id)){
    flipped.add(id);
    particles(wrap);
  }
  selected=id;
  renderCards();
  const card=CARDS.find(c=>c.id===id);
  document.getElementById('result').textContent='"'+card.lore+'"';
  document.getElementById('hint').textContent='Now try ⚔ Battle! or pick another card';
}

function revealAll(){
  CARDS.forEach(c=>flipped.add(c.id));
  renderCards();
  document.getElementById('result').textContent='All cards revealed!';
}

function battle(){
  if(!selected){
    document.getElementById('result').textContent='Pick a card first!';return;
  }
  const myCard=CARDS.find(c=>c.id===selected);
  const others=CARDS.filter(c=>c.id!==selected);
  const opp=others[Math.floor(Math.random()*others.length)];
  flipped.add(opp.id);
  const myScore=myCard.power+myCard.speed+myCard.defense;
  const oppScore=opp.power+opp.speed+opp.defense;
  let msg='';
  if(myScore>oppScore){
    msg=`⚔ ${myCard.name} (${myScore}) defeats ${opp.name} (${oppScore})!`;
    score.wins++;
  } else if(myScore<oppScore){
    msg=`💀 ${opp.name} (${oppScore}) defeats ${myCard.name} (${myScore})!`;
    score.losses++;
  } else {
    msg=`🤝 Draw! Both score ${myScore}.`;
    score.draws++;
  }
  document.getElementById('result').textContent=msg;
  document.getElementById('wins').textContent=score.wins;
  document.getElementById('losses').textContent=score.losses;
  document.getElementById('draws').textContent=score.draws;
  renderCards();
}

function reset(){
  flipped=new Set();selected=null;
  document.getElementById('result').textContent='';
  document.getElementById('hint').textContent='Click any card to flip it';
  renderCards();
}

function particles(el){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  const colors=['#f5d56e','#c9913c','#ff6b6b','#fff'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--tx:${(Math.random()-0.5)*120}px;--ty:${(Math.random()-0.8)*120}px;animation-delay:${i*0.03}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1100);
  }
}

renderCards();
</script>
</body>
</html>
