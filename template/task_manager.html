<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager | Thendo Nephalama</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f8;--surface:#ffffff;--card:#ffffff;
  --border:#e2e8f4;--text:#1a1d2e;--muted:#7a8099;
  --todo:#e8f0ff;--todo-accent:#3b5bdb;
  --prog:#fff3e0;--prog-accent:#f59f00;
  --done:#e6faf0;--done-accent:#37b24d;
  --danger:#ff4757;--radius:14px;
  --shadow:0 2px 12px rgba(30,40,80,0.08);
  --shadow-lg:0 8px 32px rgba(30,40,80,0.14);
}
[data-theme="dark"]{
  --bg:#0d0f1a;--surface:#141625;--card:#1c1f35;
  --border:rgba(255,255,255,0.07);--text:#e8eaf6;--muted:#5c6080;
  --todo:#1a2040;--todo-accent:#748ffc;
  --prog:#201800;--prog-accent:#ffd43b;
  --done:#0d1f15;--done-accent:#51cf66;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;transition:background .3s,color .3s;
}

/* Topbar */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:1rem 2rem;display:flex;align-items:center;
  justify-content:space-between;gap:1rem;flex-wrap:wrap;
  position:sticky;top:0;z-index:200;
  box-shadow:var(--shadow);
}
.logo{
  font-size:1.3rem;font-weight:800;letter-spacing:-.03em;
  display:flex;align-items:center;gap:.5rem;
}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#3b5bdb,#7048e8);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.topbar-actions{display:flex;align-items:center;gap:.75rem}
.icon-btn{
  width:38px;height:38px;border-radius:10px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.icon-btn:hover{background:var(--bg);color:var(--text);border-color:var(--todo-accent)}

/* Stats bar */
.stats{
  display:flex;gap:1rem;padding:1.5rem 2rem;
  overflow-x:auto;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.5rem;
  min-width:130px;flex:1;
  display:flex;flex-direction:column;gap:.25rem;
  box-shadow:var(--shadow);
}
.stat-val{font-size:2rem;font-weight:800;line-height:1}
.stat-lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;gap:.75rem;
  padding:.75rem 2rem;flex-wrap:wrap;
}
.search-wrap{
  flex:1;min-width:180px;max-width:320px;
  position:relative;
}
.search-wrap input{
  width:100%;padding:.6rem .75rem .6rem 2.4rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;
  font-size:.9rem;outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--todo-accent)}
.search-wrap i{
  position:absolute;left:.75rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1rem;
}
.filter-btns{display:flex;gap:.4rem}
.filter-btn{
  padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.filter-btn.active,.filter-btn:hover{
  background:var(--todo-accent);color:#fff;border-color:var(--todo-accent);
}
.add-btn{
  margin-left:auto;
  padding:.6rem 1.25rem;border-radius:10px;
  background:linear-gradient(135deg,#3b5bdb,#7048e8);
  color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;
  border:none;cursor:pointer;
  display:flex;align-items:center;gap:.4rem;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(59,91,219,.35);
}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,91,219,.45)}

/* Board */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5rem;padding:0 2rem 2rem;
}
.column{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
  min-height:500px;display:flex;flex-direction:column;
  transition:box-shadow .2s;
}
.column.drag-over{
  box-shadow:0 0 0 2px var(--todo-accent);
  background:rgba(59,91,219,0.03);
}
.col-header{
  padding:1.25rem 1.25rem .75rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid;
}
.col-header.todo-h{border-color:var(--todo-accent)}
.col-header.prog-h{border-color:var(--prog-accent)}
.col-header.done-h{border-color:var(--done-accent)}
.col-title{
  display:flex;align-items:center;gap:.6rem;
  font-weight:700;font-size:1rem;
}
.col-dot{width:10px;height:10px;border-radius:50%}
.col-count{
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  padding:2px 10px;border-radius:20px;font-weight:500;
}
.todo-count{background:var(--todo);color:var(--todo-accent)}
.prog-count{background:var(--prog);color:var(--prog-accent)}
.done-count{background:var(--done);color:var(--done-accent)}

.task-list{
  padding:.75rem;display:flex;flex-direction:column;gap:.6rem;
  flex:1;min-height:80px;
}
.task{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:1rem;
  cursor:grab;user-select:none;
  transition:all .2s;
  border-left:3px solid transparent;
}
.task:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.task.dragging{opacity:.4;transform:rotate(2deg) scale(.97)}
.task-title{font-weight:600;font-size:.95rem;margin-bottom:.3rem;line-height:1.3}
.task-desc{font-size:.8rem;color:var(--muted);line-height:1.4;margin-bottom:.6rem}
.task-footer{display:flex;align-items:center;justify-content:space-between;gap:.4rem}
.priority{
  padding:2px 10px;border-radius:20px;
  font-size:.7rem;font-weight:700;letter-spacing:.03em;
}
.p-high{background:#ffe3e3;color:#c92a2a}
.p-medium{background:#fff3e0;color:#e67700}
.p-low{background:#e6faf0;color:#2b8a3e}
[data-theme="dark"] .p-high{background:rgba(201,42,42,.2);color:#ff8787}
[data-theme="dark"] .p-medium{background:rgba(230,119,0,.15);color:#ffa94d}
[data-theme="dark"] .p-low{background:rgba(43,138,62,.15);color:#8ce99a}
.task-date{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted)}
.task-actions{display:flex;gap:.25rem;opacity:0;transition:opacity .15s}
.task:hover .task-actions{opacity:1}
.act{background:none;border:none;cursor:pointer;padding:3px;border-radius:5px;font-size:.85rem;transition:background .15s}
.act:hover{background:var(--bg)}
.overdue{color:var(--danger)!important}

.col-add{
  margin:.5rem .75rem .75rem;
  padding:.6rem;text-align:center;
  border:1px dashed var(--border);border-radius:10px;
  color:var(--muted);font-size:.8rem;cursor:pointer;
  transition:all .15s;
}
.col-add:hover{border-color:var(--todo-accent);color:var(--todo-accent);background:var(--todo)}
.empty-state{
  text-align:center;padding:2rem 1rem;color:var(--muted);
  font-size:.85rem;display:flex;flex-direction:column;gap:.5rem;
}
.empty-state i{font-size:2rem;opacity:.3}

/* Modal */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:1000;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.overlay.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;width:90%;max-width:480px;
  padding:2rem;box-shadow:0 30px 60px rgba(0,0,0,.4);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;
}
.modal-title{font-size:1.2rem;font-weight:800}
.close-modal{
  background:none;border:none;font-size:1.3rem;
  color:var(--muted);cursor:pointer;padding:.25rem;
  border-radius:6px;transition:color .15s;
}
.close-modal:hover{color:var(--danger)}
.form-group{margin-bottom:1.1rem}
.form-group label{
  display:block;font-size:.83rem;font-weight:600;
  color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em;
}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:.7rem .9rem;
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
  border-color:var(--todo-accent);
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem}
.btn-save{
  padding:.7rem 1.5rem;border-radius:10px;
  background:linear-gradient(135deg,#3b5bdb,#7048e8);
  color:#fff;font-family:'Outfit',sans-serif;font-weight:700;
  border:none;cursor:pointer;transition:transform .15s;
}
.btn-save:hover{transform:translateY(-1px)}
.btn-cancel{
  padding:.7rem 1.2rem;border-radius:10px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{color:var(--text);border-color:var(--text)}

/* Toast */
.toast{
  position:fixed;bottom:2rem;right:2rem;z-index:2000;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:.9rem 1.25rem;
  font-size:.85rem;font-weight:600;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:.6rem;
  transform:translateY(20px);opacity:0;
  transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* Back link */
.back-link{
  position:fixed;bottom:2rem;left:2rem;z-index:100;
  padding:.6rem 1.25rem;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--muted);text-decoration:none;
  font-size:.8rem;font-weight:600;
  transition:all .2s;
}
.back-link:hover{color:var(--todo-accent);border-color:var(--todo-accent)}

@media(max-width:900px){
  .board{grid-template-columns:1fr}
  .stats{gap:.75rem}
  .stat-card{min-width:100px}
}
@media(max-width:600px){
  .topbar,.stats,.toolbar,.board{padding-left:1rem;padding-right:1rem}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Portfolio</a>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📋</div>
    Task Manager
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="exportBtn" title="Export JSON"><i class='bx bx-export'></i></button>
    <button class="icon-btn" id="themeBtn" title="Toggle theme"><i class='bx bx-moon'></i></button>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-val" id="sTot">0</div>
    <div class="stat-lbl">Total</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" style="color:var(--todo-accent)" id="sTodo">0</div>
    <div class="stat-lbl">To Do</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" style="color:var(--prog-accent)" id="sProg">0</div>
    <div class="stat-lbl">In Progress</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" style="color:var(--done-accent)" id="sDone">0</div>
    <div class="stat-lbl">Done</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" style="color:var(--danger)" id="sOver">0</div>
    <div class="stat-lbl">Overdue</div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <i class='bx bx-search'></i>
    <input type="text" id="searchInput" placeholder="Search tasks…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="high">🔴 High</button>
    <button class="filter-btn" data-filter="medium">🟡 Med</button>
    <button class="filter-btn" data-filter="low">🟢 Low</button>
  </div>
  <button class="add-btn" id="addBtn">+ New Task</button>
</div>

<!-- Board -->
<div class="board">
  <div class="column" id="col-todo">
    <div class="col-header todo-h">
      <div class="col-title"><div class="col-dot" style="background:var(--todo-accent)"></div>To Do</div>
      <span class="col-count todo-count" id="cnt-todo">0</span>
    </div>
    <div class="task-list" id="list-todo" data-col="todo"></div>
    <div class="col-add" data-col="todo">+ Add task</div>
  </div>
  <div class="column" id="col-progress">
    <div class="col-header prog-h">
      <div class="col-title"><div class="col-dot" style="background:var(--prog-accent)"></div>In Progress</div>
      <span class="col-count prog-count" id="cnt-progress">0</span>
    </div>
    <div class="task-list" id="list-progress" data-col="progress"></div>
    <div class="col-add" data-col="progress">+ Add task</div>
  </div>
  <div class="column" id="col-done">
    <div class="col-header done-h">
      <div class="col-title"><div class="col-dot" style="background:var(--done-accent)"></div>Done</div>
      <span class="col-count done-count" id="cnt-done">0</span>
    </div>
    <div class="task-list" id="list-done" data-col="done"></div>
    <div class="col-add" data-col="done">+ Add task</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Task</div>
      <button class="close-modal" id="closeModal">✕</button>
    </div>
    <input type="hidden" id="editId">
    <input type="hidden" id="editCol">
    <div class="form-group">
      <label>Title *</label>
      <input type="text" id="fTitle" placeholder="What needs to be done?" maxlength="80">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="fDesc" rows="2" placeholder="Add more details…" maxlength="300"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="fPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="datetime-local" id="fDue">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-save" id="saveTask">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tasks=JSON.parse(localStorage.getItem('tm_tasks'))||[];
let filter='all', search='', editId=null, dragId=null;

function saveTasks(){localStorage.setItem('tm_tasks',JSON.stringify(tasks))}
function uid(){return 'task_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}

function toast(msg,icon='✓'){
  const t=document.getElementById('toast');
  t.innerHTML=`<span>${icon}</span>${msg}`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function isOverdue(t){
  return t.due && new Date(t.due)<new Date() && t.col!=='done';
}

function render(){
  ['todo','progress','done'].forEach(col=>{
    const list=document.getElementById('list-'+col);
    let filtered=tasks.filter(t=>t.col===col);
    if(filter!=='all') filtered=filtered.filter(t=>t.priority===filter);
    if(search) filtered=filtered.filter(t=>t.title.toLowerCase().includes(search)||t.desc.toLowerCase().includes(search));

    list.innerHTML='';
    if(!filtered.length){
      list.innerHTML=`<div class="empty-state"><i class='bx bx-task-x'></i><span>No tasks here</span></div>`;
    } else {
      filtered.forEach(t=>list.appendChild(makeTask(t)));
    }
    document.getElementById('cnt-'+col).textContent=filtered.length;
  });
  updateStats();
}

function makeTask(t){
  const div=document.createElement('div');
  div.className='task';
  div.draggable=true;
  div.dataset.id=t.id;
  const colors={todo:'var(--todo-accent)',progress:'var(--prog-accent)',done:'var(--done-accent)'};
  div.style.borderLeftColor=colors[t.col];
  const od=isOverdue(t);
  div.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div class="task-title">${t.title}</div>
      <div class="task-actions">
        <button class="act" data-act="edit" data-id="${t.id}" title="Edit">✏️</button>
        <button class="act" data-act="del" data-id="${t.id}" title="Delete">🗑</button>
      </div>
    </div>
    ${t.desc?`<div class="task-desc">${t.desc}</div>`:''}
    <div class="task-footer">
      <span class="priority p-${t.priority}">${t.priority}</span>
      ${t.due?`<span class="task-date ${od?'overdue':''}">${od?'⚠ ':''}${new Date(t.due).toLocaleDateString('en-ZA',{day:'numeric',month:'short'})}</span>`:''}
    </div>
  `;
  div.addEventListener('dragstart',e=>{dragId=t.id;div.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
  div.addEventListener('dragend',()=>div.classList.remove('dragging'));
  div.querySelector('[data-act="edit"]').onclick=(e)=>{e.stopPropagation();openModal(t.col,t.id)};
  div.querySelector('[data-act="del"]').onclick=(e)=>{e.stopPropagation();deleteTask(t.id)};
  return div;
}

function updateStats(){
  const tot=tasks.length;
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sTodo').textContent=tasks.filter(t=>t.col==='todo').length;
  document.getElementById('sProg').textContent=tasks.filter(t=>t.col==='progress').length;
  document.getElementById('sDone').textContent=tasks.filter(t=>t.col==='done').length;
  document.getElementById('sOver').textContent=tasks.filter(t=>isOverdue(t)).length;
}

function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  saveTasks();render();toast('Task deleted','🗑');
}

// Drag & drop on lists
document.querySelectorAll('.task-list').forEach(list=>{
  list.addEventListener('dragover',e=>{e.preventDefault();list.closest('.column').classList.add('drag-over')});
  list.addEventListener('dragleave',()=>list.closest('.column').classList.remove('drag-over'));
  list.addEventListener('drop',e=>{
    e.preventDefault();
    list.closest('.column').classList.remove('drag-over');
    if(!dragId) return;
    const newCol=list.dataset.col;
    const t=tasks.find(t=>t.id===dragId);
    if(t&&t.col!==newCol){t.col=newCol;saveTasks();render();toast('Task moved','↗')}
    dragId=null;
  });
});

// Modal
function openModal(col='todo',id=null){
  editId=id;
  document.getElementById('editCol').value=col;
  if(id){
    const t=tasks.find(t=>t.id===id);
    document.getElementById('modalTitle').textContent='Edit Task';
    document.getElementById('fTitle').value=t.title;
    document.getElementById('fDesc').value=t.desc||'';
    document.getElementById('fPriority').value=t.priority;
    document.getElementById('fDue').value=t.due||'';
  } else {
    document.getElementById('modalTitle').textContent='New Task';
    document.getElementById('fTitle').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fPriority').value='medium';
    document.getElementById('fDue').value='';
  }
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}
function closeModal(){document.getElementById('overlay').classList.remove('show');editId=null}

document.getElementById('saveTask').onclick=()=>{
  const title=document.getElementById('fTitle').value.trim();
  if(!title) return;
  if(editId){
    const t=tasks.find(t=>t.id===editId);
    t.title=title;t.desc=document.getElementById('fDesc').value.trim();
    t.priority=document.getElementById('fPriority').value;
    t.due=document.getElementById('fDue').value;
    toast('Task updated','✓');
  } else {
    tasks.push({id:uid(),col:document.getElementById('editCol').value,title,desc:document.getElementById('fDesc').value.trim(),priority:document.getElementById('fPriority').value,due:document.getElementById('fDue').value,created:new Date().toISOString()});
    toast('Task created','✓');
  }
  saveTasks();render();closeModal();
};

document.getElementById('closeModal').onclick=closeModal;
document.getElementById('cancelModal').onclick=closeModal;
document.getElementById('overlay').onclick=e=>{if(e.target===document.getElementById('overlay'))closeModal()};
document.getElementById('addBtn').onclick=()=>openModal('todo');
document.querySelectorAll('.col-add').forEach(b=>b.onclick=()=>openModal(b.dataset.col));

// Search & filter
document.getElementById('searchInput').oninput=e=>{search=e.target.value.toLowerCase();render()};
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');filter=b.dataset.filter;render();
  };
});

// Theme
document.getElementById('themeBtn').onclick=()=>{
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('themeBtn').innerHTML=d?`<i class='bx bx-moon'></i>`:`<i class='bx bx-sun'></i>`;
};

// Export
document.getElementById('exportBtn').onclick=()=>{
  const a=document.createElement('a');
  a.href='data:text/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(tasks,null,2));
  a.download='tasks.json';a.click();
  toast('Exported tasks.json','📤');
};

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openModal('todo')}
});

// Seed if empty
if(!tasks.length){
  tasks=[
    {id:uid(),col:'todo',title:'Design new landing page',desc:'Create wireframes using Figma',priority:'high',due:new Date(Date.now()+2*86400000).toISOString(),created:new Date().toISOString()},
    {id:uid(),col:'todo',title:'Write unit tests',desc:'Cover all API endpoints',priority:'medium',due:'',created:new Date().toISOString()},
    {id:uid(),col:'progress',title:'Build REST API',desc:'Flask + PostgreSQL backend for the dashboard',priority:'high',due:new Date(Date.now()+86400000).toISOString(),created:new Date().toISOString()},
    {id:uid(),col:'progress',title:'Setup CI/CD pipeline',desc:'GitHub Actions deployment',priority:'low',due:'',created:new Date().toISOString()},
    {id:uid(),col:'done',title:'Setup project structure',desc:'Initialized repo and base files',priority:'low',due:'',created:new Date().toISOString()},
  ];
  saveTasks();
}
render();
</script>
</body>
</html>
